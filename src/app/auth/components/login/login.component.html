<div style="width:300px;margin:60px auto;text-align:center">
  <h2>Sign In</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <!-- EMAIL -->
    <input 
      type="email"
      placeholder="Enter Email"
      formControlName="email"
      style="width:100%;padding:8px"
    >

    <div style="color:red;font-size:12px" *ngIf="loginForm.get('email')?.touched">
      
      <div *ngIf="loginForm.get('email')?.errors?.['required']">
        Email is required
      </div>

      <div *ngIf="loginForm.get('email')?.errors?.['email']">
        Enter a valid email (example&#64;domain.com)
      </div>

    </div>

    <br>

    <input 
      type="password"
      placeholder="Enter Password"
      formControlName="password"
      style="width:100%;padding:8px"
    >

    <div style="color:red;font-size:12px" *ngIf="loginForm.get('password')?.touched">
      <div *ngIf="loginForm.get('password')?.errors?.['required']">
        Password is required
      </div>
    </div>

    <br>

    <button type="submit" style="padding:8px 20px">
      Sign In
    </button>

  </form>
</div>
