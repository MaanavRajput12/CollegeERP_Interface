<section class="page-shell auth-page">
  <div class="auth-card hero-card">
    <div class="auth-copy">
      <span class="eyebrow">Secure Access</span>
      <h1 class="page-title">Sign in to the APNA SCHOOL ERP portal.</h1>
      <p class="page-subtitle">
        Continue to the student workspace for attendance, timetable, exams, and fee tracking.
      </p>
    </div>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <label class="field-label" for="email">Institution Email</label>
      <input id="email" class="field-input" type="email" placeholder="example@school.edu" formControlName="email">
      <div class="field-error" *ngIf="loginForm.get('email')?.touched">
        <div *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</div>
        <div *ngIf="loginForm.get('email')?.errors?.['email']">Enter a valid email address.</div>
      </div>

      <label class="field-label" for="password">Password</label>
      <input id="password" class="field-input" type="password" placeholder="Enter your password" formControlName="password">
      <div class="field-error" *ngIf="loginForm.get('password')?.touched">
        <div *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</div>
      </div>

      <button class="btn-primary auth-submit" type="submit">Sign In</button>
    </form>
  </div>
</section>
